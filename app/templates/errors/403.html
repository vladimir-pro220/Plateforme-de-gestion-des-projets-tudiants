{% extends "base.html" %}
{% block title %}403 — Accès refusé{% endblock %}

{% block content %}
<div class="error-page">
    <div class="container text-center py-5">
        <div class="error-code text-danger">403</div>
        <div class="error-icon">🔒</div>
        <h2 class="error-title">Accès refusé</h2>
        <p class="error-desc text-muted">
            Vous n'avez pas les permissions nécessaires pour accéder à cette page.
        </p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
                <i class="bi bi-house me-2"></i>Retour à l'accueil
            </a>
            <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-outline-primary">
                <i class="bi bi-speedometer2 me-2"></i>Mon dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}

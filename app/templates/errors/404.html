{% extends "base.html" %}
{% block title %}404 — Page introuvable{% endblock %}

{% block content %}
<div class="error-page">
    <div class="container text-center py-5">
        <div class="error-code text-primary">404</div>
        <div class="error-icon">🔍</div>
        <h2 class="error-title">Page introuvable</h2>
        <p class="error-desc text-muted">
            La page que vous recherchez n'existe pas ou a été déplacée.
        </p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
                <i class="bi bi-house me-2"></i>Retour à l'accueil
            </a>
            <a href="{{ url_for('projects.list') }}" class="btn btn-outline-primary">
                <i class="bi bi-folder2-open me-2"></i>Voir les projets
            </a>
        </div>
    </div>
</div>
{% endblock %}

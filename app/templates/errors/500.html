{% extends "base.html" %}
{% block title %}500 — Erreur serveur{% endblock %}

{% block content %}
<div class="error-page">
    <div class="container text-center py-5">
        <div class="error-code text-warning">500</div>
        <div class="error-icon">⚙️</div>
        <h2 class="error-title">Erreur serveur</h2>
        <p class="error-desc text-muted">
            Une erreur interne s'est produite. Notre équipe a été notifiée.
            Veuillez réessayer dans quelques instants.
        </p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
                <i class="bi bi-house me-2"></i>Retour à l'accueil
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Page précédente
            </button>
        </div>
    </div>
</div>
{% endblock %}
